version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: propcart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: propcart_crm
      POSTGRES_USER: propcart
      POSTGRES_PASSWORD: propcart_local
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U propcart -d propcart_crm']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: propcart_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
